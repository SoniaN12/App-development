<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Soul Shop | Add Product</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
  <div class="noise"></div>

  <header>
    <div class="logo">
      <div class="logo-icon">
        <i class="fa-solid fa-bag-shopping"></i>
      </div>
      <div class="logo-text">
        <span class="logo-title">Soul Shop</span>
        <span class="logo-subtitle">Glow in every detail</span>
      </div>
    </div>

    <nav>
      <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
      <a href="products.html"><i class="fa-solid fa-store"></i> Products</a>
      <a href="add-product.html" class="active"><i class="fa-solid fa-square-plus"></i> Add Product</a>
      <a href="orders.html"><i class="fa-solid fa-box"></i> Orders</a>
    </nav>
  </header>

  <main>
    <section class="page-top">
      <h1 class="section-title">Add a New Product</h1>
      <p class="section-subtitle">
        Enter product details below to add them to your shop.
      </p>
    </section>

    <section class="form-section">
      <form id="productForm" class="form-card glass-card">
        <div class="input-group">
          <label for="name">Product Name</label>
          <input type="text" id="name" placeholder="Product name" required />
        </div>

        <div class="input-group">
          <label for="desc">Description</label>
          <textarea id="desc" placeholder="Product description" required></textarea>
        </div>

        <div class="input-group">
          <label for="price">Price</label>
          <input type="number" id="price" step="0.01" min="0" placeholder="Price" required />
        </div>

        <div class="input-group">
          <label for="image">Image URL or Path</label>
          <input type="text" id="image" placeholder="Image URL or local image path" required />
        </div>

        <button type="submit" class="btn">
          <i class="fa-solid fa-plus"></i>
          Add Product
        </button>
      </form>

      <p id="formMessage" class="message"></p>
    </section>
  </main>

  <footer>
    © 2026 Soul Shop — All rights reserved.
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
